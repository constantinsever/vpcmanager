name: Deploy Lambda Functions

on:
  push:
  workflow_dispatch:
  
    branches:
      - dev
      - main
    paths:
      - "lambdas/**"
      - ".github/workflows/deploy-lambdas.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-central-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set deployment environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "APP_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Deploy Lambda functions
        run: |
          for dir in lambdas/*; do
            if [ -d "$dir" ]; then

              FUNCTION_BASE_NAME=$(basename "$dir")
              FUNCTION_NAME="${FUNCTION_BASE_NAME}-${APP_ENV}"

              echo "----------------------------------------"
              echo "Deploying Lambda: $FUNCTION_NAME"
              echo "Source folder: $dir"
              echo "Environment: $APP_ENV"
              echo "----------------------------------------"

              rm -rf package lambda.zip
              mkdir package

              if [ -f "$dir/requirements.txt" ]; then
                echo "Installing requirements..."
                pip install -r "$dir/requirements.txt" -t package
              fi

              echo "Copying Python files..."
              cp "$dir"/*.py package/

              echo "Creating deployment package..."
              cd package
              zip -r ../lambda.zip .
              cd ..

              echo "Updating Lambda code..."
              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --zip-file fileb://lambda.zip

              echo "Waiting for code update to finish..."
              aws lambda wait function-updated \
                --function-name "$FUNCTION_NAME"

              echo "Deployed $FUNCTION_NAME successfully."

              rm -rf package lambda.zip

            fi
          done